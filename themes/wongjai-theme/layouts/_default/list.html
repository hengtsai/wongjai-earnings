{{ define "main" }}
<div class="container" style="padding-top: 3rem;">
  <h1 class="section-title">{{ .Title }}</h1>
  <div class="earnings-grid">
    {{ range .Pages.ByDate.Reverse }}
    <a class="earning-card" href="{{ .RelPermalink }}">
      <div class="card-header">
        <span class="ticker-badge">{{ .Params.ticker | default "N/A" }}</span>
        <span class="card-date">{{ .Date.Format "2006-01-02" }}</span>
      </div>
      <h3 class="card-title">{{ .Title }}</h3>
      <p class="card-excerpt">{{ .Summary | plainify | truncate 120 }}</p>
      <div class="card-tags">
        {{ range .Params.tags }}
        <span class="tag">{{ . }}</span>
        {{ end }}
      </div>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
